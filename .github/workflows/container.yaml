name: container
on:
  workflow_dispatch:
    inputs:
      project_ref:
        description: "Project git ref to checkout"
        default: "main"
        type: string
  workflow_call:
    inputs:
      project_ref:
        description: "Project git ref to checkout"
        default: "main"
        type: string

env:
  REGISTRY: ghcr.io

jobs:
  # Sets permissions of the CONTAINER_DEPLOY_TOKEN to allow artifact attestation
  # this has been created as personal access token and added to the secrets list of the repo
  # see https://docs.github.com/en/actions/security-guides/automatic-token-authentication#permissions-for-the-github_token
  container:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
    strategy:
      matrix:
        python-version: ["3.14"]
      fail-fast: true
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: 2maz/slurm-monitor-py${{matrix.python-version}}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          ref: ${{ github.event.inputs.project_ref }}

      # https://docs.github.com/en/actions/tutorials/publish-packages/publish-docker-images
      # Uses the docker/login-action action to log in to the Container registry
      # registry using the account and password that will publish the packages.
      # Once published, the packages are scoped to the account defined here.
      - name: Log in to the Container registry
        uses: docker/login-action@65b78e6e13532edd9afa3aa52ac7964289d1a9c1
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CONTAINER_DEPLOY_TOKEN }}

      # This step uses docker/metadata-action to extract tags and labels that
      # will be applied to the specified image. The id "meta" allows the output
      # of this step to be referenced in a subsequent step. The images value
      # provides the base name for the tags and labels.
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@9ec57ed1fcdbf14dcef7dfbe97b2010124a938b7
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      #
      # https://docs.github.com/en/packages/working-with-a-github-packages-registry/working-with-the-container-registry
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@f2a1d5e99d037542a71f64918e516c093c6f3fc4
        with:
          context: docker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.project_ref }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            PYTHON_VERSION=${{matrix.python-version}}
            SLURM_MONITOR_TAG=${{ github.event.inputs.project_ref }}

      # This step uses the docker/build-push-action action to build the
      # image, based on your repository's Dockerfile. If the build succeeds,
      # it pushes the image to GitHub Packages. It uses the context parameter
      # to define the build's context as the set of files located in the
      # specified path. For more information, see Usage in the README of the
      # docker/build-push-action repository. It uses the tags and labels
      # parameters to tag and label the image with the output from the "meta"
      # step.
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true
